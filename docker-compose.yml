version: '3.8'

services:
  # ── PostgreSQL ──────────────────────────────────────
  db:
    image: postgres:15
    container_name: ballpark_db
    environment:
      POSTGRES_DB: ballpark
      POSTGRES_USER: ballpark
      POSTGRES_PASSWORD: ballpark1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ballpark"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ballpark_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ────────────────────────────────
  backend:
    build: ./backend
    container_name: ballpark_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ballpark:ballpark1234@db:5432/ballpark
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ── Frontend (React) ─────────────────────────────────
  frontend:
    build: ./frontend
    container_name: ballpark_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
